# SonarQube Helm Values
# Chart: sonarqube/sonarqube

monitoringPasscode: "define_it"

persistence:
  enabled: true
  storageClass: gp2
  size: 10Gi

resources:
  requests:
    cpu: 400m
    memory: 2Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# Uses embedded H2 database (suitable for dev/demo)
# For production, configure external PostgreSQL
