controller:
  admin:
    username: admin
    existingSecret: jenkins-admin-secret

  serviceType: ClusterIP

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2048Mi"

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - docker-workflow
    - configuration-as-code
    - aws-credentials
    - pipeline-aws
    - kubernetes-cli
    - blueocean

  clouds:
    - name: "kubernetes"
      kubernetes:
        serverUrl: ""
        namespace: "jenkins"
        jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
        jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
        podTemplates:
          - name: "agent"
            label: "AGENT"
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:latest"
                resourceRequestCpu: "250m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "500m"
                resourceLimitMemory: "512Mi"
              - name: "dind"
                image: "docker:dind"
                privileged: true
                resourceRequestCpu: "250m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "1000m"
                resourceLimitMemory: "1024Mi"
                envVars:
                  - envVar:
                      key: "DOCKER_TLS_CERTDIR"
                      value: ""

persistence:
  enabled: true
  storageClass: gp2
  size: 10Gi
