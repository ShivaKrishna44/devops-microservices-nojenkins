name: CI/CD Pipeline — Build & Deploy Microservices

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'charts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service to build and deploy'
        required: true
        type: choice
        options:
          - order-service
          - payment-service
          - user-service
      image_tag:
        description: 'Image tag (leave empty for commit SHA)'
        required: false
        type: string

# OIDC — required for aws-actions/configure-aws-credentials with role
permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::589389425618:role/github-actions-admin-role
  EKS_CLUSTER_NAME: expense-dev
  ECR_REGISTRY: 589389425618.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ==========================================
  # Detect which services changed (auto-trigger)
  # ==========================================
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      order: ${{ steps.changes.outputs.order }}
      payment: ${{ steps.changes.outputs.payment }}
      user: ${{ steps.changes.outputs.user }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            order:
              - 'app/order-service/**'
            payment:
              - 'app/payment-service/**'
            user:
              - 'app/user-service/**'

  # ==========================================
  # Build & Push — Order Service
  # ==========================================
  build-order:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() &&
      ((github.event_name == 'push' && needs.detect-changes.outputs.order == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.service_name == 'order-service'))
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.sha }}"
          echo "tag=${TAG:0:12}" >> $GITHUB_OUTPUT

      - name: Build & Push
        run: |
          docker build -t order-service:${{ steps.tag.outputs.tag }} ./app/order-service/
          docker tag order-service:${{ steps.tag.outputs.tag }} $ECR_REGISTRY/order-service:${{ steps.tag.outputs.tag }}
          docker push $ECR_REGISTRY/order-service:${{ steps.tag.outputs.tag }}

      - name: Update Helm values (GitOps)
        run: |
          sed -i 's|tag:.*|tag: "${{ steps.tag.outputs.tag }}"|' charts/microservice/values-order.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/microservice/values-order.yaml
          git diff --staged --quiet || git commit -m "deploy: order-service:${{ steps.tag.outputs.tag }}"
          git pull --rebase origin main
          git push

  # ==========================================
  # Build & Push — Payment Service
  # ==========================================
  build-payment:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() &&
      ((github.event_name == 'push' && needs.detect-changes.outputs.payment == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.service_name == 'payment-service'))
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.sha }}"
          echo "tag=${TAG:0:12}" >> $GITHUB_OUTPUT

      - name: Build & Push
        run: |
          docker build -t payment-service:${{ steps.tag.outputs.tag }} ./app/payment-service/
          docker tag payment-service:${{ steps.tag.outputs.tag }} $ECR_REGISTRY/payment-service:${{ steps.tag.outputs.tag }}
          docker push $ECR_REGISTRY/payment-service:${{ steps.tag.outputs.tag }}

      - name: Update Helm values (GitOps)
        run: |
          sed -i 's|tag:.*|tag: "${{ steps.tag.outputs.tag }}"|' charts/microservice/values-payment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/microservice/values-payment.yaml
          git diff --staged --quiet || git commit -m "deploy: payment-service:${{ steps.tag.outputs.tag }}"
          git pull --rebase origin main
          git push

  # ==========================================
  # Build & Push — User Service
  # ==========================================
  build-user:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() &&
      ((github.event_name == 'push' && needs.detect-changes.outputs.user == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.service_name == 'user-service'))
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.sha }}"
          echo "tag=${TAG:0:12}" >> $GITHUB_OUTPUT

      - name: Build & Push
        run: |
          docker build -t user-service:${{ steps.tag.outputs.tag }} ./app/user-service/
          docker tag user-service:${{ steps.tag.outputs.tag }} $ECR_REGISTRY/user-service:${{ steps.tag.outputs.tag }}
          docker push $ECR_REGISTRY/user-service:${{ steps.tag.outputs.tag }}

      - name: Update Helm values (GitOps)
        run: |
          sed -i 's|tag:.*|tag: "${{ steps.tag.outputs.tag }}"|' charts/microservice/values-user.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/microservice/values-user.yaml
          git diff --staged --quiet || git commit -m "deploy: user-service:${{ steps.tag.outputs.tag }}"
          git pull --rebase origin main
          git push
